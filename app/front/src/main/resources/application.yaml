server:
  port: 8080
spring:
  application:
    name: sre-front
  kafka:
    bootstrap-servers: "127.0.0.1:9092"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

# Actuator settings ##################################################
management:
  info.git.mode: full
  server:
    port: 8081
    address: 0.0.0.0
  endpoints:
    web:
      base-path: /
      exposure:
        include: health, info, metrics, prometheus
    access:
      default: read_only
  endpoint:
    health:
      probes.enabled: true
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true

# Structured JSON logging -> Promtail -> Loki ########
logging:
  structured:
    format:
      console: ecs