server:
  port: 8084
spring:
  application:
    name: sre-reader
  datasource.url: jdbc:postgresql://localhost:5432/postgres
  datasource.username: -placeholder-
  datasource.password: -placeholder-
  datasource.driverClassName: org.postgresql.Driver

  jpa.hibernate.ddl-auto: validate

# Actuator settings ##################################################
management:
  info.git.mode: full
  server:
    port: 8081
    address: 0.0.0.0
  endpoints:
    web:
      base-path: /
      exposure:
        include: health, info, metrics, prometheus
    access:
      default: read_only
  endpoint:
    health:
      probes.enabled: true
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        "[http.server.requests]": true

# Structured JSON logging -> Promtail -> Loki ########
logging:
  structured:
    format:
      console: ecs