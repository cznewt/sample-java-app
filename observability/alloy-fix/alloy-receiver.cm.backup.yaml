n\n  retry_on_failure {\n    enabled = true\n    initial_interval = \"5s\"\n    max_interval = \"30s\"\n    max_elapsed_time = \"5m\"\n  }\n}\n\nremote.kubernetes.secret \"primary_otlp\" {\n  name      = \"primary-otlp-k8s-monitoring\"\n  namespace = \"kube-monitor\"\n}\n"},"kind":"ConfigMap","metadata":{"annotations":{},"name":"k8s-monitoring-alloy-receiver","namespace":"kube-monitor"}}
