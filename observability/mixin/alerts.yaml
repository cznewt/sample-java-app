# Prometheus alerting rules for the SRE-challenge Spring Boot JVMs.
# Rendered from grafana/jsonnet-libs/jvm-observ-lib (metricsSource=java_micrometer).
# Filtering selector: job=~"sre-.*", namespace="sre-challenge".
# Load under Prometheus `rule_files:` or a PrometheusRule CR's `spec`.
groups:
- name: sre-jvm-jvm-alerts
  rules:
  - alert: JvmMemoryFillingUp
    annotations:
      description: JVM heap memory usage is at {{ printf "%.0f" $value }}% over the last 5 minutes on {{$labels.instance}}, which is above the threshold of 80%.
      summary: JVM heap memory filling up.
    expr: ((sum without (id) (jvm_memory_used{area="heap", job=~"sre-.*", namespace="sre-challenge"}))/(sum without (id) (jvm_memory_max{area="heap", job=~"sre-.*", namespace="sre-challenge"} != -1))) * 100 > 80
    for: 5m
    keep_firing_for: 5m
    labels:
      severity: warning
  - alert: JvmThreadsDeadlocked
    annotations:
      description: 'JVM deadlock detected: Threads in the JVM application {{$labels.instance}} are in a cyclic dependency with each other. The restart is required to resolve the deadlock.'
      summary: JVM deadlock detected.
    expr: (jvm_threads_deadlocked{job=~"sre-.*", namespace="sre-challenge"}) > 0
    for: 2m
    keep_firing_for: 5m
    labels:
      severity: critical
